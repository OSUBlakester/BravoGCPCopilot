<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create - Redirecting</title>
</head>
<body>
    <script>
        const params = new URLSearchParams(window.location.search);
        const from = params.get('from');
        const targetParams = new URLSearchParams();
        targetParams.set('compose_entry', '1');
        if (from) {
            targetParams.set('from', from);
        }
        window.location.replace(`gridpage.html?${targetParams.toString()}`);
    </script>
</body>
</html>
