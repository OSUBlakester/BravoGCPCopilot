<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TouchChat Migration</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    body { font-family: Inter, sans-serif; background: #f8fafc; }
    .tab-button { padding: 10px 14px; border-bottom: 2px solid transparent; color: #475569; font-weight: 600; }
    .tab-button.active { color: #1d4ed8; border-color: #1d4ed8; }
    .tab-button:disabled { color: #94a3b8; cursor: not-allowed; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .upload-zone { border: 2px dashed #cbd5e1; border-radius: 10px; padding: 24px; text-align: center; cursor: pointer; }
    .upload-zone.dragover { border-color: #2563eb; background: #eff6ff; }
    .button-item.selected { background: #eff6ff; border-color: #60a5fa; }
  </style>
</head>
<body>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
  <script>
    (async function initMigrationAuthContext() {
      const cfgResp = await fetch('/api/frontend-config');
      const cfgData = await cfgResp.json();
      const firebaseConfig = cfgData.firebase_config || cfgData;
      if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
      }
      firebase.auth().onAuthStateChanged(async (user) => {
        if (user) {
          const currentAacUserId = sessionStorage.getItem('currentAacUserId');
          const tokenFromUser = await user.getIdToken();
          sessionStorage.setItem('firebaseIdToken', tokenFromUser);
          if (!currentAacUserId) {
            window.location.href = 'auth.html';
            return;
          }
          window.authenticatedFetch = async (url, options = {}) => {
            const headers = options.headers || {};
            headers['Authorization'] = `Bearer ${tokenFromUser}`;
            headers['X-User-ID'] = currentAacUserId;
            const adminTargetAccountId = sessionStorage.getItem('adminTargetAccountId');
            if (adminTargetAccountId) headers['X-Admin-Target-Account'] = adminTargetAccountId;
            options.headers = headers;
            const response = await fetch(url, options);
            if (response.status === 401 || response.status === 403) {
              sessionStorage.clear();
              window.location.href = 'auth.html';
              throw new Error('Session expired.');
            }
            return response;
          };
          document.dispatchEvent(new CustomEvent('migrationAuthReady'));
        } else {
          sessionStorage.clear();
          window.location.href = 'auth.html';
        }
      });
    })();
  </script>

  <div class="max-w-6xl mx-auto p-4">
    <div class="bg-white border rounded-lg shadow-sm">
      <div class="border-b px-4 pt-2 flex gap-2 overflow-x-auto">
        <button class="tab-button active" data-tab="upload"><i class="fas fa-upload mr-2"></i>Upload</button>
        <button class="tab-button" data-tab="boards" disabled><i class="fas fa-table mr-2"></i>Boards</button>
        <button class="tab-button" data-tab="buttons" disabled><i class="fas fa-hand-pointer mr-2"></i>Buttons</button>
        <button class="tab-button" data-tab="execute" disabled><i class="fas fa-play mr-2"></i>Execute</button>
      </div>

      <div class="p-4">
        <div id="statusBar" class="text-sm text-slate-600 mb-4">Ready to upload a TouchChat .ce file.</div>
        <div id="importResultPanel" class="hidden mb-4 border rounded p-3 bg-emerald-50 border-emerald-200">
          <div id="importResultMessage" class="text-sm text-emerald-900 font-medium"></div>
          <div class="mt-3 flex gap-2">
            <button id="migrateAnotherBoardBtn" class="px-3 py-1.5 bg-emerald-600 text-white rounded text-sm hover:bg-emerald-700">Migrate Another Board</button>
            <button id="migrationDoneBtn" class="px-3 py-1.5 bg-slate-200 rounded text-sm">Done</button>
          </div>
        </div>

        <section class="tab-content active" data-tab="upload">
          <div id="uploadZone" class="upload-zone">
            <div class="text-2xl text-slate-400 mb-2"><i class="fas fa-file-archive"></i></div>
            <div class="font-semibold text-slate-700">Drop TouchChat .ce file here or click to browse</div>
            <div class="text-sm text-slate-500 mt-1">Supported: .ce, .ce.zip</div>
            <input type="file" id="ceFileInput" accept=".ce,.zip,.ce.zip" class="hidden">
          </div>
          <div id="uploadSummary" class="hidden mt-3 text-sm text-slate-700"></div>
        </section>

        <section class="tab-content" data-tab="boards">
          <label for="sourceBoardSelect" class="block text-sm font-medium text-slate-700 mb-2">Choose Source TouchChat Board</label>
          <select id="sourceBoardSelect" class="w-full border rounded px-3 py-2"></select>
          <div id="boardMeta" class="mt-2 text-sm text-slate-600"></div>
        </section>

        <section class="tab-content" data-tab="buttons">
          <div class="flex items-center justify-between mb-3">
            <div class="font-medium text-slate-700">Select Buttons to Import</div>
            <div class="text-sm text-slate-600"><span id="selectedButtonCount">0</span> selected</div>
          </div>
          <div class="mb-2 flex gap-2">
            <button id="selectAllButtonsBtn" class="px-3 py-1 bg-slate-200 rounded text-sm">Select All</button>
            <button id="clearAllButtonsBtn" class="px-3 py-1 bg-slate-200 rounded text-sm">Clear All</button>
          </div>
          <div id="buttonList" class="space-y-2 max-h-[420px] overflow-y-auto pr-1"></div>
        </section>

        <section class="tab-content" data-tab="execute">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <div class="text-sm font-medium text-slate-700 mb-2">Destination Board</div>
              <label class="flex items-center gap-2 text-sm mb-2"><input type="radio" name="destinationType" value="new" checked> Create New Board</label>
              <label class="flex items-center gap-2 text-sm mb-3"><input type="radio" name="destinationType" value="existing"> Use Existing Board</label>

              <div id="newDestinationWrap">
                <input id="newDestinationName" class="w-full border rounded px-3 py-2" placeholder="New board name">
              </div>

              <div id="existingDestinationWrap" class="hidden">
                <select id="existingDestinationBoard" class="w-full border rounded px-3 py-2"></select>
              </div>
            </div>

            <div>
              <label class="block text-sm font-medium text-slate-700 mb-2">If destination exists</label>
              <select id="mergeMode" class="w-full border rounded px-3 py-2 mb-3">
                <option value="update">Update by grid position (overwrite colliding cells)</option>
                <option value="replace">Replace board buttons entirely</option>
              </select>


            </div>
          </div>

          <div id="navResolutionSection" class="hidden mt-5 border rounded p-3 bg-amber-50">
            <div class="font-medium text-amber-900 mb-2">Resolve Missing Navigation Targets</div>
            <div id="navResolutionList" class="space-y-3"></div>
          </div>

          <div class="mt-5 flex gap-2">
            <button id="executeImportBtn" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">Execute Migration</button>
            <button id="resetMigrationBtn" class="px-4 py-2 bg-slate-200 rounded">Reset</button>
          </div>
        </section>
      </div>
    </div>
  </div>

  <script src="/static/touchchat_migration.js"></script>
</body>
</html>
